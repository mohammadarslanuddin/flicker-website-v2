<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home</title>
<link rel="stylesheet" href="flicker/colors_and_type.css" />
<!-- Phosphor Icons (Flicker DS v2 icon set) — regular for UI glyphs, fill for play/pause/headphones -->
<link rel="stylesheet" type="text/css" href="vendor/phosphor/regular/style.css" />
<link rel="stylesheet" type="text/css" href="vendor/phosphor/fill/style.css" />
<style>
  :root {
    /* Active theme — overridden by Tweaks panel */
    --bg: var(--flicker-paper);
    --bg-rgb: 255, 254, 251;
    --ink: var(--flicker-body);
    --ink-rgb: 34, 25, 27;
    --ink-soft: var(--flicker-ink-soft);
    --ink-muted: var(--flicker-ink-mute);
    --rule: var(--flicker-canvas-shade);
    --brick: var(--flicker-brick);
    --brick-rgb: 193, 52, 65;
    --brick-hover: #A82934;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  /* .flicker-root (design-system class on <body>) hard-codes a canvas-cream
     background at higher specificity; pin it to the active --bg (paper) so it
     never flashes through during section cross-dissolves. */
  body.flicker-root { background: var(--bg); }
  a { color: inherit; text-decoration: none; }
  #root { min-height: 100vh; }

  /* ---------- ScrollSmoother wrapper ----------
     ScrollSmoother needs a wrapper + content pair. We let it manage the
     scroll itself; #smooth-wrapper is the viewport, #smooth-content is what
     actually scrolls inside it. */
  #smooth-wrapper {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* ---------- CTA buttons (Flicker DS — updated spec) ----------
     primary  → body color filled (was brick previously; brick is now a
                separate 'brand' variant reserved for signature moments)
     secondary → white fill with a neutral-grey hairline that drops on hover
     brand    → brick fill (kept available; not used in this hero)
  */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 28px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.005em;
    text-decoration: none;
    border-radius: var(--radius-full);
    border: none;
    /* Transform is driven by GSAP (see hero-v3.jsx); CSS transitions cover
       the color/border/shadow side so they stay theme-aware. */
    transition: background-color var(--dur-base) var(--ease-out),
                color var(--dur-base) var(--ease-out),
                box-shadow var(--dur-base) var(--ease-out),
                border-color var(--dur-base) var(--ease-out);
    will-change: transform;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .cta-arrow {
    display: inline-flex;
    align-items: center;
    /* arrow slide is driven by GSAP — see hero-v3.jsx */
  }

  /* Primary — body color fill */
  .cta-primary {
    background: var(--flicker-body);
    color: var(--flicker-canvas);
  }
  .cta-primary:hover {
    background: var(--flicker-ink-soft);
  }

  /* Secondary — white with a subtle neutral-grey hairline, no shadow (Flicker DS v2 spec).
     Uses the DS v2 neutral-grey ramp (greige, kept apart from the brand palette). */
  .cta-secondary {
    background: #FFFFFF;
    color: var(--flicker-body);
    border: 1px solid #E7E4DE;          /* --grey-200 */
  }
  .cta-secondary:hover {
    background: #EEECE7;                 /* --grey-150 */
    border-color: transparent;
  }

  /* ---------- Genre rows (How-it-works Phase-A horizontal scrub) ---------- */
  .genre-row {
    position: relative;
    /* No overflow:hidden — track flows naturally; section overflow clips
       only at the viewport edges. */
    width: 100%;
  }
  .genre-track {
    display: inline-block;
    white-space: nowrap;
    will-change: transform;
    /* Common style for all four rows — same weight, same style, same color. */
    font-family: var(--font-serif-display);
    font-weight: 700;
    font-style: normal;
    font-size: 72px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--flicker-canvas-shade);
  }

  /* ---------- Stacked book avatars (in the bottom-left tagline) ---------- */
  .stat-stack {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .stat-stack-cover {
    width: 14px;
    height: 20px;
    object-fit: cover;
    border-radius: 4px;
    border: 1.5px solid var(--flicker-paper);
    background: var(--flicker-canvas-shade);
    box-shadow: 0 1px 3px rgba(34,25,27,0.25);
    flex-shrink: 0;
    display: block;
  }
  .stat-stack-cover + .stat-stack-cover { margin-left: -6px; }

  /* ---------- Book of the week card ----------
     Sits above the bottom-left tagline. Quiet warm canvas-soft surface, no
     shadow, hairline border \u2014 a piece of static editorial chrome, not a
     popover. Image is sized in proportion to the text column so neither
     dominates. */
  .book-card-wrap {
    position: absolute;
    /* Scaled to 0.9375x via zoom (0.75x scaled up by 1.25) — zoom (not transform)
       so it doesn't fight the GSAP entrance / hover-lift / scroll-fade
       transforms on the inner elements. */
    zoom: 0.9375;
    /* Anchored bottom-left, sitting just ABOVE the "2,300+ titles" tagline and
       left-aligned to it. left/bottom are pre-divided by the zoom so the card's
       visual edges hold (24px gutter, ~60px up) as the zoom changes. */
    left: 25.6px;
    bottom: 64px;
    z-index: 26;
    width: 296px;
    max-width: calc(100vw - 72px);
  }
  /* Lift wrapper — contains both the card link and the × button so the
     hover animation moves them as a unit. Shadow toggles on .is-lifted. */
  .book-card-lift {
    position: relative;
    border-radius: var(--radius-md);
    will-change: transform;
  }
  .book-card-lift .book-card {
    transition: background var(--dur-base) var(--ease-out),
                border-color var(--dur-base) var(--ease-out),
                box-shadow var(--dur-base) var(--ease-out);
  }
  .book-card-lift.is-lifted .book-card {
    box-shadow: var(--shadow-sm);
  }
  .book-card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 32px 10px 10px;
    background: var(--flicker-canvas-soft);
    border: 1px solid var(--flicker-canvas-shade);
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--flicker-body);
    will-change: transform;
  }
  /* Hover surface tone is owned by the lift wrapper now — see .book-card-lift
     above. Shadow is also added on .is-lifted. */
  .book-card-wrap:hover .book-card {
    background: #EEECE7;
    border-color: transparent;
  }
  .book-card-cover {
    width: 38px;
    height: 56px;
    flex-shrink: 0;
    object-fit: cover;
    border-radius: 3px;
    background: var(--flicker-canvas-shade);
  }
  .book-card-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .book-card-badge {
    display: inline-flex;
    align-self: flex-start;
    align-items: center;
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: var(--radius-full);
    background: var(--flicker-misty-rose);
    color: var(--flicker-cosmos);
    line-height: 1;
    margin-bottom: 2px;
  }
  .book-card-title {
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--flicker-body);
    letter-spacing: -0.04em;
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .book-card-meta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 400;
    color: var(--flicker-ink-mute);
    line-height: 1.3;
  }
  .book-card-meta-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
    flex-shrink: 0;
  }
  .book-card-genre {
    font-style: italic;
  }
  .book-card-dismiss {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 20px;
    height: 20px;
    padding: 0;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--flicker-ink-mute);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background var(--dur-base) var(--ease-out),
                color var(--dur-base) var(--ease-out);
  }
  .book-card-dismiss:hover {
    background: var(--flicker-canvas-shade);
    color: var(--flicker-body);
  }

  /* =================================================================
     HOW IT WORKS — one continuous pinned section.
     Phase A: genre horizontal scrub, with the Lottie box parked bottom-right.
     Phase B: the box morphs into a MARGINED stage panel (not full-bleed).
     Phase C: three scroll-scrubbed beats (phone center, copy left, rail right).
     ================================================================= */
  .hiw-section {
    position: relative;
    background: var(--bg);
    color: var(--flicker-body);
  }
  .hiw-pin {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  /* Genre scrub heading (top-left) — fades out during the morph. */
  .hiw-heading {
    position: absolute;
    top: 0; left: 0;
    padding: 64px 24px;
    max-width: 1100px;
    z-index: 6;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    will-change: opacity, transform;
  }
  .hiw-heading .t-h1 {
    margin: 0;
    max-width: 920px;
    color: var(--ink);
    text-wrap: pretty;
    line-height: 1.1;
    font-size: 46px;
    font-family: var(--font-serif-display);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  /* Genre rows — full-bleed, parked toward the bottom; fade out during morph. */
  .hiw-rows {
    position: absolute;
    left: 0; right: 0;
    bottom: 60px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    will-change: opacity;
  }
  /* Warm-neutral stage panel. Geometry (left/top/width/height) is driven by
     JS each scroll tick so it can grow from the bottom-right box to the
     MARGINED full-stage rect. Never full-bleed. */
  .hiw-panel {
    position: absolute;
    background: #F2F0EC;
    border-radius: 22px;
    overflow: hidden;
    z-index: 8;
    will-change: left, top, width, height;
  }
  /* Left + right columns live inside the panel and only appear once the
     panel is (almost) full. */
  .hiw-grid {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(28px, 3.4vw, 64px);
  }
  .hiw-copy {
    position: relative;
    flex: 0 0 auto;
    width: clamp(150px, 16.8vw, 360px);
    /* Comfortable margin from the panel edge; the taller phone owns the centre. */
    transform: translateX(0);
    will-change: opacity;
  }
  .hiw-copy-beat {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    will-change: opacity;
  }
  .hiw-copy-beat p {
    margin: 0;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: clamp(16px, 1.25vw, 20px);
    line-height: 1.5;
    letter-spacing: -0.005em;
  }
  .hiw-copy-beat .rword { color: #BCB4AD; }
  /* Phase-A heading words start gray; JS fills them to ink on scroll. */
  .hiw-heading .hiw-fill-word { color: #BCB4AD; }
  /* Right column — vertical progress rail + step label. */
  .hiw-rail {
    position: relative;
    flex: 0 0 auto;
    width: clamp(150px, 16.8vw, 360px);
    /* Matches the copy column width so the phone sits equidistant from both. */
    transform: translateX(0);
    display: flex;
    align-items: center;
    gap: 24px;
    will-change: opacity;
  }
  .rail-track {
    position: relative;
    flex: 0 0 auto;
    width: 2px;
    height: 52px;
    border-radius: 2px;
    background: rgba(34,25,27,0.16);
    overflow: hidden;
  }
  .rail-fill {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0%;
    background: var(--flicker-body);
    border-radius: 2px;
    will-change: height;
  }
  .rail-labels {
    position: relative;
    flex: 1 1 auto;
    min-height: 84px;
  }
  .rail-beat {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    transform: translateY(-50%);
    will-change: opacity;
  }
  .rail-step {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--flicker-ink-mute);
    margin: 0 0 6px 0;
    letter-spacing: 0;
  }
  .rail-title {
    font-family: var(--font-serif-display);
    font-weight: 700;
    font-size: clamp(22px, 1.9vw, 30px);
    line-height: 1.08;
    letter-spacing: -0.04em;
    color: var(--flicker-body);
    margin: 0;
    text-wrap: balance;
  }
  /* Phone — child of the panel (so it is clipped by the box in box-state),
     but its rect is JS-driven independently so it can be a cut-off preview
     in the box and a centered full device in the stage. */
  .hiw-phone {
    position: absolute;
    z-index: 12;
    will-change: left, top, width, height;
  }
  /* Looping product video — occupies the phone's rect while the box is parked
     bottom-right, then crossfades into the 1st Lottie during the morph.
     Corner radius matches the Lottie "app screen" frame (.phone-frame: 13% / 5.8%)
     so the video and the Lottie animations share an identical screen rounding. */
  .hiw-box-video {
    position: absolute;
    z-index: 13;
    border-radius: 9% / 4%;
    overflow: hidden;
    /* Force the rounded corners to clip cleanly even though this is a
       composited (will-change/transform) layer during scroll — without the
       mask, the video bleeds a 1px line at each corner. */
    isolation: isolate;
    -webkit-mask-image: -webkit-radial-gradient(white, black);
    -webkit-mask-image: radial-gradient(white, black);
    mask-image: radial-gradient(white, black);
    pointer-events: none;
    will-change: left, top, width, height, opacity;
  }
  .hiw-box-video > video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
  }
  .phone-frame {
    position: absolute;
    inset: 0;
    background: #FFF8F6;
    border-radius: 9% / 4%;
    /* Soft drop shadow removed per request — only the screen-edge hairline remains. */
    box-shadow: inset 0 0 0 1px rgba(34,25,27,0.06);
    overflow: hidden;
  }
  .phone-screen {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: inherit;
  }
  .lottie-holder {
    position: absolute;
    inset: 0;
    will-change: opacity;
  }
  .lottie-holder svg, .lottie-holder canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  @media (max-width: 900px) {
    .hiw-copy { display: none; }
  }
  @media (max-width: 680px) {
    .hiw-rail { display: none; }
  }

  /* =================================================================
     SUMMARIES SHOWCASE — pinned section after "How it works".
     Centered heading + body fade/blur in, then fill gray->ink word by
     word; the block rises on scroll to open space for a slow auto-looping
     carousel of every cover. No rotation. Hover pauses the loop and the
     cover resizes + expands into a card on a light tonal tint of its
     dominant colour.
     ================================================================= */
  .sw-section {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }
  .sw-pin {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  /* Heading block — vertically centered; JS translates it up on scroll. */
  .sw-head {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(92vw, 720px);
    text-align: center;
    z-index: 2;
    will-change: transform;
  }
  .sw-h2 {
    margin: 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: clamp(28px, 3vw, 44px);
    line-height: 1.12;
    letter-spacing: -0.02em;
    text-wrap: balance;
  }
  .sw-line { display: block; will-change: opacity, transform, filter; }
  .sw-sub {
    margin: 18px auto 0 auto;
    max-width: 560px;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: clamp(17px, 1.4vw, 22px);
    line-height: 1.5;
    text-wrap: pretty;
    will-change: opacity, transform, filter;
  }
  /* Two-tone words start gray (unfilled); JS fills them to ink. */
  .sw-word { color: rgb(188, 180, 173); }

  /* ---- Carousel (auto-loop marquee, bottom-anchored) ---- */
  /* ---- Carousel (auto-loop marquee). The band is TALL so a hovered card
     can grow from center and still sit inside its hover target — that is
     what keeps the loop reliably paused (no resume "jerk"). The band is
     click-through; only the covers capture the pointer. ---- */
  .sw-carousel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: clamp(28px, 5vh, 72px);     /* clear bottom margin — books do not bleed */
    height: clamp(380px, 58vh, 760px);
    z-index: 1;
    pointer-events: none;
    will-change: opacity, transform, filter;
  }
  /* Soft blurred gradient at each edge — covers dissolve into it on the
     way in / out of the loop. */
  .sw-carousel::before,
  .sw-carousel::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: clamp(64px, 11vw, 190px);
    z-index: 3;
    pointer-events: none;
    -webkit-backdrop-filter: blur(7px);
    backdrop-filter: blur(7px);
  }
  .sw-carousel::before {
    left: 0;
    background: linear-gradient(to right, var(--bg) 12%, rgba(var(--bg-rgb), 0) 100%);
    -webkit-mask-image: linear-gradient(to right, #000, transparent);
    mask-image: linear-gradient(to right, #000, transparent);
  }
  .sw-carousel::after {
    right: 0;
    background: linear-gradient(to left, var(--bg) 12%, rgba(var(--bg-rgb), 0) 100%);
    -webkit-mask-image: linear-gradient(to left, #000, transparent);
    mask-image: linear-gradient(to left, #000, transparent);
  }
  .sw-track {
    display: flex;
    align-items: center;
    gap: 15px;                          /* 14–16px between books */
    width: max-content;
    height: 100%;
    /* Position is now JS-driven (auto-loop + drag + wheel) — see
       showcase-v6.jsx. translateX is written on every frame. */
    transform: translateX(0);
    will-change: transform;
    user-select: none;
    -webkit-user-select: none;
  }
  .sw-item {
    flex: 0 0 auto;
    width: clamp(200px, 28vh, 360px);   /* large covers, sized to viewport height */
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;            /* card centered in the tall column */
    pointer-events: auto;
    cursor: grab;                       /* grab-to-drag the loop */
    touch-action: pan-y;                /* horizontal = drag; vertical = page scroll */
  }
  /* Whole band shows the grabbing cursor while a drag is in progress. */
  .sw-carousel.is-grabbing .sw-item { cursor: grabbing; }
  /* Covers must never start a native image-drag — that would hijack the pointer. */
  .sw-cover { -webkit-user-drag: none; user-select: none; }
  /* Card — upright (no rotation). The hover morph (scale, tint, meta open)
     is driven by GSAP from JS, so no CSS transitions live here. */
  .sw-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 0;                         /* bare image at rest; GSAP pads on hover */
    border-radius: 18px;
    background: transparent;
    transform-origin: center center;
    will-change: transform;
  }
  /* Tint surface as its own layer — GSAP ramps ITS opacity (not a colour
     alpha), so the exact same hue fades in with zero colour shift. */
  .sw-card-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    border-radius: 18px;
    background: var(--tint, hsl(45, 40%, 93%));
    opacity: 0;
    pointer-events: none;
  }
  .sw-cover {
    position: relative;
    z-index: 1;
    display: block;
    align-self: center;
    width: 100%;
    height: auto;                       /* native 640x940 ratio — no cropping */
    border-radius: 11% / 7.5%;          /* matches the cover artwork's rounded corners */
  }
  /* Meta — collapsed at rest; GSAP animates height/opacity open on hover. */
  .sw-meta {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    width: 100%;
    height: 0;
    opacity: 0;
    overflow: hidden;
  }
  .sw-title {
    margin: 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 16px;
    line-height: 1.18;
    letter-spacing: -0.04em;
    color: var(--flicker-body);
    text-wrap: balance;
  }
  .sw-author {
    margin: 6px 0 0 0;
    font-family: var(--font-sans);
    font-size: 12.5px;
    color: var(--flicker-ink-mute);
  }
  .sw-desc {
    margin: 6px 0 0 0;
    font-family: var(--font-sans);
    font-size: 12.5px;
    line-height: 1.4;
    color: var(--flicker-ink-soft);
    text-wrap: pretty;
  }
  .sw-tag {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: var(--radius-full);
    background: rgba(155, 203, 251, 0.32);
    color: #1f4d80;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
  }
  .sw-btn {
    margin-top: 12px;
    width: 100%;
    box-sizing: border-box;
    opacity: 0;                         /* fades in only after the morph completes */
    padding: 11px 14px;
    border-radius: var(--radius-full);
    background: var(--flicker-body);
    color: var(--flicker-canvas);
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    text-decoration: none;
    transition: background var(--dur-base) var(--ease-out);
  }
  .sw-btn:hover { background: #000; }

  /* ---- Hover: only the stacking context changes via CSS; the morph
     (scale, tint, cover shrink, meta open) is GSAP-driven from JS. ---- */
  .sw-item:hover { z-index: 20; }

  @media (prefers-reduced-motion: reduce) {
    .sw-word { color: var(--flicker-body); }
    .sw-line, .sw-sub { opacity: 1 !important; filter: none !important; transform: none !important; }
    .sw-track { animation: none; }
  }
  @media (max-width: 760px) {
    .sw-item { width: 124px; }
    .sw-track { gap: 14px; }
  }

  /* =================================================================
     LISTEN — "Listen your first summary now" (section 06).
     A rounded panel (fades + blurs in on scroll) holding a centred
     headphones glyph + heading and one immersive summary-player card.
     ================================================================= */
  .ln-section {
    position: relative;
    background: var(--bg);
  }
  /* Pinned viewport-height stage that hosts the flipping card. Carries the
     3D perspective + the centring/padding the section used to own. */
  .ln-stage {
    position: relative;
    min-height: 100vh;
    perspective: 1500px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(40px, 8vh, 110px) clamp(16px, 4vw, 64px) clamp(80px, 12vh, 150px);
  }
  /* The black container the flipped card becomes. The footer lives INSIDE
     it (no separate black block = no seam/crease at the junction), and
     future sections can slot in above the footer within this container. */
  .ln-belly {
    position: relative;
    background: #22191B;
    /* The container itself insets the footer panel — the footer has no
       wrapper or background of its own. */
    padding: clamp(5px, 0.5vw, 9px);
  }
  /* Black cap extending above the belly's top edge, painted in the normal
     page layer BEHIND the composited flip card. ScrollSmoother moves the
     page by fractional pixels, and the card (its own 3D layer) rounds them
     differently — a subpixel gap can open at the card/container junction
     for a frame while scrolling. With this cap, that gap reveals black
     instead of the page background, so no hairline ever shows. */
  .ln-belly::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 100%;
    height: 100px;
    background: #22191B;
    pointer-events: none;
  }
  /* ---- Outer card (Almond) ---- */
  .ln-panel {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    box-sizing: border-box;
    background: var(--flicker-almond);
    border-radius: 24px;
    padding: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: opacity, transform, filter;
    /* Children are 3D faces — the panel itself is the flipping card. */
    transform-style: preserve-3d;
  }
  /* Front face — wraps the existing content; replicates the panel's column
     centering so layout is unchanged. Hidden past 90° of the flip. */
  .ln-face-front {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  /* Back face — the next section's opening surface (the footer frame's
     black). Pre-rotated 180° so it only shows once the card flips past 90°;
     1px of Z keeps it clear of the panel's own background plane. */
  .ln-face-back {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: #22191B;   /* --flicker-body — matches .ln-belly */
    transform: rotateX(-180deg) translateZ(1px);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* ---- Top icon (provided SVG container — already includes its own backing) ---- */
  .ln-icon-img {
    display: block;
    width: 68px;
    height: 68px;
  }

  /* ---- Headline ---- */
  .ln-headline {
    margin: 20px 0 0 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 36px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--flicker-body);
    text-align: center;
  }

  /* ---- Inner card (white) ---- */
  .ln-inner {
    margin-top: 72px;
    width: 100%;
    box-sizing: border-box;
    background: var(--flicker-paper);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* ---- Book info region ---- */
  .ln-bookinfo { display: flex; gap: 20px; align-items: stretch; }
  /* Cover stretches to match the height of the text column beside it; if that
     content gets shorter the cover shrinks with it. Aspect ratio is locked to the
     image's intrinsic 640:940, so width follows height and it never crops. */
  /* Cover height is synced to the text column (JS); aspect ratio stays locked to
     the image's 640:940 so it never crops. Falls back to a sensible width. */
  .ln-cover {
    flex: 0 0 auto;
    width: 112px;
    border-radius: 10px;
    overflow: hidden;
  }
  .ln-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ln-text { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
  .ln-title {
    margin: 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: -0.04em;
    color: var(--flicker-cosmos);
  }
  .ln-desc {
    margin: 8px 0 0 0;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 14px;
    line-height: 1.5;
    color: var(--flicker-ink-soft);
  }

  /* ---- Metadata row ---- */
  .ln-meta { margin-top: 16px; display: flex; align-items: stretch; gap: 24px; flex-wrap: wrap; }
  /* Subtle vertical divider between the two info columns */
  .ln-meta-divider { flex: 0 0 auto; align-self: stretch; width: 1px; background: var(--flicker-canvas-shade); }
  .ln-meta-item { display: flex; align-items: center; gap: 8px; }
  .ln-meta-item i { font-size: 14px; line-height: 1; color: var(--flicker-ink-mute); }
  .ln-meta-tb { display: flex; flex-direction: column; }
  .ln-meta-label {
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 11px;
    line-height: 1.3;
    color: var(--flicker-ink-mute);
  }
  .ln-meta-value {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    color: var(--flicker-body);
  }

  /* ---- Audio player region ---- */
  .ln-audio { display: flex; align-items: center; gap: 12px; }
  .ln-pause {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--flicker-paper);
    border: 1px solid var(--flicker-canvas-shade);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--flicker-body);
  }
  .ln-pause i { font-size: 14px; line-height: 1; display: block; }
  /* Provided spectrum SVG — stretches edge-to-edge in the row (no side gaps),
     placeholder until the real audio stream drives it. */
  .ln-spectrum { flex: 1 1 auto; min-width: 0; width: 100%; height: 48px; object-fit: fill; display: block; }
  .ln-time {
    flex: 0 0 auto;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 13px;
    color: var(--flicker-ink-soft);
  }

  @media (prefers-reduced-motion: reduce) {
    .ln-panel { opacity: 1 !important; filter: none !important; transform: none !important; }
  }

  /* =================================================================
     GROWING — "Readers Are Already Growing" social-proof + features
     bento (section 05). Centred header (bg-ellipses glow + subsection-dots
     grid + avatar badge + display heading + lead) over a STAGGERED 3-column
     bento whose imagery cells are Lottie animations (except the audio-player
     card). Pure Flicker tokens — paper surfaces, hairline borders, restrained
     shadows. The glow + dots are the supplied SVG assets (no CSS gradient).
     ================================================================= */
  .gw-section {
    position: relative;
    background: var(--bg);
    color: var(--flicker-body);
    padding: clamp(40px, 8vh, 110px) clamp(20px, 4vw, 64px) clamp(96px, 14vh, 188px);
    overflow: hidden;
  }

  /* ---- Header group — PINNED in the centre of the viewport (exactly like
     the previous section): it reveals from blur, holds while the heading +
     body fill gray->ink, then releases and scrolls up + fades out to the
     bento. The supplied SVGs sit behind the text in their set order (glow
     under dots) and move with the group. ---- */
  .gw-header-group {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    will-change: transform, opacity, filter;
  }
  /* bg-ellipses.svg — soft blue + brick blurred ellipses behind the heading.
     Centred inside the (centred) group, so it can never bleed up under the
     previous section. Shown at the file's own opacity; GSAP only morphs it. */
  .gw-glow {
    position: absolute;
    z-index: 0;
    left: 50%;
    top: 50%;
    width: min(760px, 96vw);
    aspect-ratio: 728 / 580;
    background: url("uploads/bg-ellipses.svg") center / contain no-repeat;
    pointer-events: none;
    will-change: transform, opacity;
  }
  /* subsection-dots.svg — the radial dot field behind the heading. Visible at
     the file's NATIVE opacity; it fades in (0 -> 1) with the rest at 80%. */
  .gw-dots {
    position: absolute;
    z-index: 1;
    left: 50%;
    top: 50%;
    width: min(1104px, 100vw);
    aspect-ratio: 1104 / 370;
    background: url("uploads/subsection-dots.svg.svg") center / contain no-repeat;
    opacity: 0;
    pointer-events: none;
    will-change: opacity;
  }

  /* ---- Header ---- */
  .gw-head {
    position: relative;
    z-index: 2;
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Avatar badge — white pill, overlapping real-face avatars + label.
     GSAP morphs it open on scroll (collapsed circle → full pill). */
  .gw-badge {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 8px 24px 8px 8px;
    background: var(--flicker-paper);
    border-radius: var(--radius-full);
    box-shadow: 0 6px 22px -10px hsl(345 30% 10% / 0.22), 0 2px 6px -2px hsl(345 30% 10% / 0.08);
    overflow: hidden;
    white-space: nowrap;
  }
  .gw-avatars { display: inline-flex; align-items: center; flex-shrink: 0; }
  .gw-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2.5px solid var(--flicker-paper);
    object-fit: cover;
    background: var(--flicker-canvas-shade);
    flex-shrink: 0;
    will-change: transform, opacity;
  }
  .gw-avatar + .gw-avatar { margin-left: -14px; }
  .gw-badge-label {
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 400;
    color: var(--flicker-ink-soft);
    letter-spacing: -0.01em;
  }
  .gw-badge-label b { color: var(--flicker-body); font-weight: 700; }

  .gw-h2 {
    margin: clamp(24px, 3.6vh, 42px) 0 0 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: clamp(28px, 3vw, 44px);
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-wrap: balance;
  }
  .gw-body {
    margin: clamp(16px, 2.4vh, 26px) auto 0;
    max-width: 560px;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: clamp(17px, 1.4vw, 22px);
    line-height: 1.5;
    text-wrap: pretty;
  }
  /* Two-tone fill words start muted; GSAP scrubs them to ink. */
  .gw-word { color: var(--flicker-ink-mute); }

  /* ---- Bento ---- */
  .gw-bento {
    position: relative;
    z-index: 2;
    max-width: 1240px;
    margin: calc(clamp(4px, 1.5vh, 24px) + 7.5vh) auto 0;
    display: flex;
    align-items: flex-start;
    gap: clamp(18px, 1.8vw, 30px);
  }
  .gw-col {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 1.8vw, 30px);
  }
  /* Staggered column starts — LEFT highest, RIGHT a touch lower, CENTER
     lowest (matches the reference geometry exactly). */
  .gw-col-left   { margin-top: 0; }
  .gw-col-right  { margin-top: clamp(36px, 5vw, 72px); }
  .gw-col-center { margin-top: clamp(120px, 16vw, 232px); }

  .gw-card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: #FFFFFF;
    border: 1px solid #E2E2E2;
    border-radius: var(--radius-xl);
    padding: 0;                 /* the Lottie sits flush; only the content is padded */
    box-shadow: none;
    overflow: hidden;
    will-change: transform, opacity, filter;
  }

  /* Imagery cell ABOVE the title — the Lottie, FLUSH to the card edges with
     no padding/margin. aspect-ratio = the Lottie's own ratio so it is never
     cropped or squashed; the card's overflow:hidden just rounds the corners. */
  .gw-media {
    width: 100%;
    margin: 0;
  }
  .gw-lottie { display: block; width: 100%; }
  .gw-lottie svg, .gw-lottie canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* Content block — the ONLY padded part of the card (18px), separate from
     the flush Lottie above it. */
  .gw-card-body { padding: 18px; }
  .gw-card-body > .gw-aud { margin-bottom: 14px; }
  .gw-card-title {
    margin: 0;
    font-family: var(--font-serif);   /* Fraunces */
    font-weight: 700;
    font-size: clamp(20px, 1.6vw, 25px);
    line-height: 1.16;
    letter-spacing: -0.04em;
    color: var(--flicker-body);
  }
  .gw-card-desc {
    margin: 10px 0 0 0;
    font-family: var(--font-sans);
    font-size: clamp(13.5px, 1vw, 15px);
    line-height: 1.5;
    color: var(--flicker-ink-soft);
    text-wrap: pretty;
  }
  /* Reveal word (hero-style blur-in + rise). */
  .gw-rw { display: inline-block; will-change: transform, filter, opacity; }

  /* ---- Audio-player card (Listen Your First Summary) ---- */
  .gw-aud {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .gw-aud-top { display: flex; align-items: center; gap: 13px; }
  .gw-aud-cover {
    width: 46px; height: 46px;
    border-radius: 9px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .gw-aud-meta { min-width: 0; }
  .gw-aud-title {
    margin: 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 16px;
    line-height: 1.2;
    letter-spacing: -0.04em;
    color: var(--flicker-body);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gw-aud-sub {
    margin: 3px 0 0 0;
    font-family: var(--font-sans);
    font-size: 12.5px;
    color: var(--flicker-ink-mute);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gw-aud-wave { display: flex; align-items: center; gap: 10px; }
  .gw-aud-time {
    font-family: var(--font-sans);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--flicker-ink-mute);
    flex-shrink: 0;
  }
  .gw-wave { flex: 1 1 auto; display: flex; align-items: center; gap: 2.5px; height: 34px; }
  .gw-wave i {
    flex: 1 1 auto;
    min-width: 2px;
    border-radius: 2px;
    background: var(--flicker-canvas-shade);
    transform-origin: center;
    will-change: transform;
  }
  .gw-wave i.is-on { background: var(--brick); }
  .gw-aud-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 12px 6px 0;
    border-top: 1px solid var(--flicker-canvas-shade);
  }
  .gw-ctl {
    border: none;
    background: none;
    padding: 0;
    color: var(--flicker-ink-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .gw-ctl svg { width: 19px; height: 19px; }
  .gw-ctl-main {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--flicker-body);
    color: var(--flicker-canvas);
    flex-shrink: 0;
  }
  .gw-ctl-main svg { width: 18px; height: 18px; }
  .gw-ctl-speed {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--flicker-ink-soft);
    font-variant-numeric: tabular-nums;
  }

  @media (prefers-reduced-motion: reduce) {
    .gw-word { color: var(--flicker-body); }
    .gw-dots, .gw-glow { opacity: 1; }
    .gw-card, .gw-badge, .gw-h2, .gw-body, .gw-rw, .gw-header-group {
      opacity: 1 !important; filter: none !important; transform: none !important;
    }
  }
  @media (max-width: 860px) {
    .gw-bento { flex-direction: column; align-items: stretch; max-width: 460px; }
    .gw-col { margin-top: 0 !important; }
  }

</style>
</head>
